name: Daily AI WhatsApp Channel Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data output

      - name: Run trend scraping and content generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_CHANNEL_ID: ${{ secrets.WHAPI_CHANNEL_ID }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GITHUB_REPO_NAME: ai-whatsapp-automation
        run: |
          python scripts/main.py

      - name: Trigger Kaggle notebook via API
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install kaggle -q
          
          # Create kaggle.json for authentication
          mkdir -p ~/.kaggle
          echo '{"username":"'"$KAGGLE_USERNAME"'","key":"'"$KAGGLE_KEY"'"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          # Trigger the notebook to run
          echo "Triggering Kaggle notebook..."
          kaggle kernels output $KAGGLE_USERNAME/ai-whatsapp-image-generator --path /tmp/kaggle_check 2>/dev/null || true
          
          # Push a trigger file so Kaggle notebook knows to run
          python -c "
          import requests, json, os
          
          db_url = os.getenv('FIREBASE_DATABASE_URL', '').rstrip('/')
          db_secret = os.getenv('FIREBASE_DB_SECRET', '')
          
          trigger_data = {
            'triggered_at': __import__('datetime').datetime.now().isoformat(),
            'status': 'requested'
          }
          
          r = requests.put(
            f'{db_url}/kaggle_trigger.json?auth={db_secret}',
            json=trigger_data
          )
          print(f'Kaggle trigger saved to Firebase: {r.status_code}')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-input
          path: data/kaggle_input.json

      - name: Save workflow state
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state
          path: data/pipeline_state.json
