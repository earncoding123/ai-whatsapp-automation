name: Daily AI WhatsApp Channel Automation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data output

      - name: Run trend scraping and content generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          WHAPI_TOKEN: ${{ secrets.WHAPI_TOKEN }}
          WHAPI_CHANNEL_ID: ${{ secrets.WHAPI_CHANNEL_ID }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_REPO_NAME: ai-whatsapp-automation
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        run: |
          python scripts/main.py

      - name: Upload Kaggle input as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-input
          path: data/kaggle_input.json

      - name: Save workflow state
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state
          path: data/pipeline_state.json
